<html>

<head>
	<style>
		* {
			margin: 0;
			padding: 0;
		}

		body {
			width: 100vw;
			height: 100vh;
			display: flex;
			justify-content: center;
			align-items: center;
			background: black;
			font-family: sans-serif;
		}

		main {
			width: 50vw;
			max-width: 800px;
			min-width: 400px;
			background: black;
			display: flex;
			justify-content: center;
			align-items: center;
			flex-direction: column;
		}

		input {
			outline: none;
			border: none;
			width: 100%;
			font-size: 1.5em;
			color: red;
			background: black;
			text-align: center;
		}

		#span {
			text-align: center;
			width: 100%;
			font-size: 2em;
			border: 1px solid white;
			color: #ffffff;
		}

		::-webkit-input-placeholder {
			color: grey;
			font-style: italic;
		}

		::-moz-placeholder {
			color: grey;
			font-style: italic;
		}

		:-ms-input-placeholder {
			color: grey;
			font-style: italic;
		}

		:-moz-placeholder {
			color: grey;
			font-style: italic;
		}

		#errorm {
			height: 1vh;
		}
	</style>
	<script type="text/javascript" src="https://code.jquery.com/jquery-latest.min.js"></script>
	<script>
		function countdown(e) {
			let d = $('#d').val().split("-");
			let t = $('#t').val().split(":");
			let title = $('#ti').val();
			var url = "?y=" + d[0] + "&m=" + d[1] + "&d=" + d[2] + "&h=" + t[0] + "&mi=" + t[1] + "&t=" + title + "&bc=" + $("#b").val().split("#")[1] + "&tc=" + $("#c").val().split("#")[1];
			document.location = "https://ethanelliott.ca/count/" + url;
		}

		function pageTitle(x) {
			document.title = $("#ti").val();
		}

		function changeBackground() {
			let backColor = $("#b").val();
			$("body").css({
				background: backColor
			});
			$("input").css({
				background: backColor
			});
			$("div").css({
				background: backColor
			});
			$("label").css({
				background: backColor
			});
		}

		function changeTextColour() {
			let textColor = $("#c").val();
			$("input").css({
				color: textColor
			});
			$("label").css({
				color: textColor
			});
		}

		$(document).ready(() => {
			document.getElementById("b").addEventListener("change", changeBackground);
			document.getElementById("c").addEventListener("change", changeTextColour);
		});
	</script>
</head>

<body>
	<main>
		<div id="span">
			<input id="ti" placeholder="countdown title" onkeyup="pageTitle()" />
		</div>
		<div id="span">
			<input id="d" type="date" />
		</div>
		<div id="span">
			<input id="t" type="time" />
		</div>
		<div id="span">
			<label for="b">Background Colour</label>
			<input id="b" type="color" value="#000000" style="height:2em;" />
		</div>
		<div id="span">
			<label for="c">Text Colour</label>
			<input id="c" type="color" value="#ff0000" style="height:2em;" />
		</div>
		<div id="span">
			<input type="button" value="Start Countdown" onclick="countdown(this)" />
		</div>

	</main>
</body>

</html>
