<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0059B3">
    <style>
    @import url(http://fonts.googleapis.com/css?family=Roboto:400,100,300,500,700,900,400italic,700italic,300italic);

    * {
      padding:0;
      margin:0;
      font-family: 'Roboto', sans-serif;
      font-size: 40px;
    }

    main {
      display: block;
      height:100vh;
      width:100vw;
      position:absolute;
      z-index: 100;
    }

    main > #title {
      margin:auto auto;
      margin-top:35vh;
      text-align:center;
      transition: all 0.5s;
      color:#000;
    }

    main > #title > #name {
      color:#000;
      font-size:5em;
      font-weight: 200;
      margin-left: 2vw;
      margin-right: 2vw;
    }

    #logo {
      font-size:6em;
      display:inline-block;
      font-weight:normal;
      color:#0037d4;
    }

    #logo > #brackets {
      font-size:1em;
      font-weight:100;
      color:#000;
    }
    #speciale {
      display: inline-block;
      font-size:1em;
      -webkit-transform: rotate(-180deg) scale(1,-1);
      -moz-transform: rotate(-180deg) scale(1,-1);
    }

    </style>
    <title>Ethan Elliott</title>
  </head>
  <body>
    <main>
      <div id="title">
        <span id="logo"><span id="brackets">[</span><span id="speciale">E</span>E<span id="brackets">]</span></span>
        <span id="name">Ethan Elliott</span>
      </div>
    </main>
  </body>
</html>
