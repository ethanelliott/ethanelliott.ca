<html>
	<head>
		<style>
		@import url(http://fonts.googleapis.com/css?family=Roboto:400,100,300,500,700,900,400italic,700italic,300italic);
		* {
			padding: 0;
			margin:0;
			font-family: 'Roboto', sans-serif;
		    font-size: 40px;
			--main-accent-colour: #296fcc;
		}
		body {
			background: #000000;
		}
		#title {
			margin-left: 2vw;
			font-size:2em;
		}
		#logo {
		  font-size:3em;
		  display:inline-block;
		  font-weight:normal;
		  color:var(--main-accent-colour);
		}
		#logo > #brackets {
		  font-size:1em;
		  font-weight:100;
		  color:#eeeeee;
		}
		#speciale {
		  display: inline-block;
		  font-size:1em;
		  -webkit-transform: rotate(-180deg) scale(1,-1);
		  -moz-transform: rotate(-180deg) scale(1,-1);
		}
		#name {
		  color:#eeeeee;
		  font-size:3em;
		  font-weight: 200;
		  margin-left: 2vw;
		  margin-right: 2vw;
		}
		.blueE {
			font-size: 1em;
			color: var(--main-accent-colour);
		}
		</style>
	</head>
	<body>
		<div id="title" style="">
			<span id="logo"><span id="brackets">[</span><span id="speciale">E</span>E<span id="brackets">]</span></span>
			<span id="name"><span class="blueE">E</span>than <span class="blueE">E</span>lliott</span>
		</div>
	</body>
</html>
