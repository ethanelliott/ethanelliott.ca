replicaCount: 1

image:
  repository: ethanelliottio/trip
  tag: s-700123a
  pullPolicy: Always

service:
  type: ClusterIP
  port: 3000

ingress:
  enabled: true
  hostname: 'trip-api.elliott.haus'
  cors:
    enabled: true
    allowOrigins:
      - https://trip.elliott.haus

resources:
  limits:
    cpu: 300m
    memory: 256Mi
  requests:
    cpu: 100m
    memory: 128Mi

env:
  NODE_ENV: 'production'
  HOST: '0.0.0.0'
  PORT: '3000'
  RP_NAME: 'Trip'
  # WebAuthn relying-party id MUST match the frontend domain.
  RP_ID: 'trip.elliott.haus'
  ORIGIN: 'https://trip.elliott.haus'
  CORS_ORIGIN: 'https://trip.elliott.haus'

postgres:
  host: postgres
  port: 5432
  database: trip
  username: trip
  # Admin credentials used by the init Job to create the role/database.
  adminUser: postgres
  adminSecretName: postgres-secrets
  adminSecretKey: postgres-password

# Application secrets (DB password + JWT signing key) live in the secret
# `trip-db-secrets` with keys `db-password` and `jwt-secret`.
#
# For production these are managed out-of-band with a Bitnami SealedSecret
# (templates/sealed-secret.yaml) and createSecret stays false.
#
# For quick local bring-up, set createSecret: true and provide values below —
# Helm will create the secret as a pre-sync hook. CHANGE THESE before real use.
createSecret: false
secrets:
  dbPassword: ''
  jwtSecret: ''
