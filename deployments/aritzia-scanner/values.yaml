replicaCount: 1

image:
  repository: ethanelliottio/aritzia-scanner
  tag: s-0d61c2f
  pullPolicy: Always

service:
  type: ClusterIP
  port: 3000

ingress:
  enabled: true
  hostname: 'aritzia.elliott.haus'

resources:
  limits:
    cpu: 4
    memory: 2Gi
  requests:
    cpu: 2
    memory: 1Gi

env:
  NODE_ENV: 'production'
  PORT: '3000'
  DB_PATH: '/data/aritzia_stock.sqlite'
  MAX_CONCURRENT_DOWNLOADS: '5'
  DEBUG_LOGGING: 'true'
  NTFY_URL: 'http://ntfy.elliott-haus.svc.cluster.local'
  NTFY_TOPIC: 'aritzia-scanner'
  PUBLIC_BASE_URL: 'https://aritzia.elliott.haus'

storage:
  size: 20Gi
  path: /data
