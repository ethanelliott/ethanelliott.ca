apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: aranet-db-secrets
  namespace: elliott-haus
  annotations:
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-weight: "-10"
    helm.sh/hook-delete-policy: before-hook-creation
spec:
  template:
    metadata:
      name: aranet-db-secrets
      namespace: elliott-haus
    type: Opaque
  encryptedData:
    # Sealed via https://sealed-secrets.elliott.haus (scope: elliott-haus/aranet-db-secrets).
    # To rotate: reseal a new value through that endpoint and replace this field.
    db-password: 
