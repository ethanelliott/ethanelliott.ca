apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "aranet.fullname" . }}-db-init
  labels:
    {{- include "aranet.labels" . | nindent 4 }}
  annotations:
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
    helm.sh/hook-weight: "-5"
spec:
  ttlSecondsAfterFinished: 300
  template:
    metadata:
      labels:
        {{- include "aranet.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: db-init
    spec:
      restartPolicy: OnFailure
      containers:
        - name: db-init
          image: postgres:17.5-alpine
          env:
            - name: PGHOST
              value: {{ .Values.postgres.host | quote }}
            - name: PGPORT
              value: {{ .Values.postgres.port | quote }}
            - name: PGUSER
              value: {{ .Values.postgres.adminUser | quote }}
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.postgres.adminSecretName }}
                  key: {{ .Values.postgres.adminSecretKey }}
            - name: ARANET_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "aranet.fullname" . }}-db-secrets
                  key: db-password
            - name: ARANET_DB_NAME
              value: {{ .Values.postgres.database | quote }}
            - name: ARANET_DB_USER
              value: {{ .Values.postgres.username | quote }}
          command:
            - /bin/sh
            - -c
            - |
              set -e

              echo "Creating role '${ARANET_DB_USER}' if it does not exist..."
              psql -d postgres -c "DO \$\$BEGIN IF NOT EXISTS (SELECT FROM pg_catalog.pg_roles WHERE rolname = '${ARANET_DB_USER}') THEN CREATE ROLE ${ARANET_DB_USER} LOGIN; END IF; END\$\$;"

              echo "Setting password for '${ARANET_DB_USER}'..."
              psql -d postgres -c "ALTER ROLE ${ARANET_DB_USER} WITH PASSWORD '${ARANET_DB_PASSWORD}';"

              echo "Creating database '${ARANET_DB_NAME}' if it does not exist..."
              DB_EXISTS=$(psql -d postgres -tc "SELECT 1 FROM pg_database WHERE datname='${ARANET_DB_NAME}'" | tr -d '[:space:]')
              if [ -z "${DB_EXISTS}" ]; then
                psql -d postgres -c "CREATE DATABASE ${ARANET_DB_NAME} OWNER ${ARANET_DB_USER};"
              fi

              echo "Granting privileges..."
              psql -d postgres -c "GRANT ALL PRIVILEGES ON DATABASE ${ARANET_DB_NAME} TO ${ARANET_DB_USER};"

              echo "Done."
