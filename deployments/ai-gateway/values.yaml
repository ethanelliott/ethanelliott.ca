replicaCount: 1

image:
  repository: ethanelliottio/ai-gateway
  tag: s-700123a
  pullPolicy: Always

service:
  type: ClusterIP
  port: 3000

ingress:
  enabled: true
  hostname: 'ai-gateway.elliott.haus'
  cors:
    enabled: true
    allowOrigins:
      - https://recipes.elliott.haus
      - https://finances.elliott.haus
      - https://elliott.haus
      - https://chat.elliott.haus
    allowOriginsRegex:
      - https://.*\.elliott\.haus

resources:
  limits:
    cpu: 1000m
    memory: 512Mi
  requests:
    cpu: 250m
    memory: 256Mi

env:
  NODE_ENV: 'production'
  HOST: '0.0.0.0'
  PORT: '3000'
  # Internal cluster URLs for services
  OLLAMA_URL: 'https://ollama.elliott.haus'

# No secrets needed for now
secretEnv: []

# Set to true to create the secret via Helm (for development/testing)
createSecret: false

# Postgres connection for workflow persistence. The gateway boots fine
# without it (workflow endpoints answer 503), so this can be rolled out
# incrementally.
postgres:
  host: postgres
  port: 5432
  database: ai_gateway
  username: ai_gateway
  adminUser: postgres
  adminSecretName: postgres-secrets
  adminSecretKey: postgres-password
  # Flip to true AFTER sealing a db password into
  # templates/sealed-secret.yaml (see the comment in that file). While
  # false, the sealed secret and db-init job are not rendered and the
  # gateway runs without workflow persistence.
  sealedSecretEnabled: true
