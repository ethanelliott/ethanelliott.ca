{{- if .Values.postgres.sealedSecretEnabled }}
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: ai-gateway-db-secrets
  namespace: elliott-haus
  annotations:
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-weight: "-10"
    helm.sh/hook-delete-policy: before-hook-creation
spec:
  template:
    metadata:
      name: ai-gateway-db-secrets
      namespace: elliott-haus
    type: Opaque
  encryptedData:
    # Seal a password via https://sealed-secrets.elliott.haus
    # (scope: elliott-haus/ai-gateway-db-secrets) and paste it here, then
    # set postgres.sealedSecretEnabled=true in values.yaml.
    db-password: REPLACE_ME__SEAL_WITH_KUBESEAL_BEFORE_ENABLING
{{- end }}
