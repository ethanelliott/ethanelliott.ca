{{- if .Values.createSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: postgres-secrets
  labels:
    {{- include "postgres.labels" . | nindent 4 }}
type: Opaque
data:
  # Base64 encoded value - use: echo -n 'value' | base64
  postgres-password: {{ required "secrets.password is required when createSecret is true" .Values.secrets.password | b64enc | quote }}
{{- end }}
