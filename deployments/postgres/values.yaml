image:
  repository: postgres
  tag: '17.5-alpine'
  pullPolicy: IfNotPresent

service:
  # Headless service is always created for the StatefulSet.
  # This is the in-cluster connection port.
  port: 5432

# PostgreSQL configuration
postgres:
  # Name of the default database created on first boot
  database: app
  # Username for the default superuser
  username: postgres
  # Subdirectory of the mount used for the data directory.
  # Keeping data in a subdirectory avoids issues with lost+found on some volumes.
  pgData: /var/lib/postgresql/data/pgdata
  # Extra `-c key=value` server flags passed to postgres on startup.
  # pg_stat_statements is preloaded here so pgHero can show query stats.
  extraArgs:
    - 'shared_preload_libraries=pg_stat_statements'
    - 'pg_stat_statements.track=all'

# SQL run once when the data directory is first initialized
# (via /docker-entrypoint-initdb.d). Used to enable extensions.
# Note: this only runs on a fresh volume. For an already-initialized
# database, create the extension manually:
#   CREATE EXTENSION IF NOT EXISTS pg_stat_statements;
initdb:
  enabled: true
  scripts:
    01-pg-stat-statements.sql: |
      CREATE EXTENSION IF NOT EXISTS pg_stat_statements;

resources:
  limits:
    cpu: '1'
    memory: 1Gi
  requests:
    cpu: 250m
    memory: 256Mi

storage:
  size: 100Gi
  storageClass: local-path

# Secret holding the PostgreSQL password.
# Set createSecret: true and provide secrets.password to manage it via Helm,
# otherwise create a secret named `postgres-secrets` with key `postgres-password` manually.
createSecret: false

# Optional external TCP exposure through Traefik.
# Requires a Traefik entryPoint that listens on the postgres TCP port (e.g. `postgres`).
# Leave disabled to keep PostgreSQL internal to the cluster only.
tcpIngress:
  enabled: false
  entryPoint: postgres
