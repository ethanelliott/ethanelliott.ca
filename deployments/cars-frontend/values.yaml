replicaCount: 1

image:
  repository: ethanelliottio/cars-frontend
  tag: s-104db03
  pullPolicy: Always

service:
  type: ClusterIP
  port: 80

ingress:
  enabled: true
  hostname: 'cars.elliott.haus'

resources:
  limits:
    cpu: 200m
    memory: 128Mi
  requests:
    cpu: 100m
    memory: 64Mi

configMap:
  enabled: true
  name: cars-frontend-nginx-config
  mountPath: /etc/nginx/conf.d/default.conf
  subPath: nginx.conf
