replicaCount: 1

image:
  repository: ethanelliottio/ip-monitor
  tag: s-a54919d
  pullPolicy: Always

service:
  type: ClusterIP
  port: 3000

ingress:
  enabled: true
  hostname: 'ip-monitor.elliott.haus'

resources:
  limits:
    cpu: 200m
    memory: 128Mi
  requests:
    cpu: 50m
    memory: 64Mi

postgres:
  host: postgres
  port: 5432
  database: ip_monitor
  username: ip_monitor
  # Name of the secret containing the ip-monitor DB password.
  # Must have a key 'db-password'.
  # Set createSecret: true and provide password to manage it via Helm,
  # otherwise create the secret manually:
  #   kubectl create secret generic ip-monitor-db-secrets --from-literal=db-password=<password>
  createSecret: false
  # Admin credentials used by the init Job to create the role/database.
  adminUser: postgres
  adminSecretName: postgres-secrets
  adminSecretKey: postgres-password

env:
  NODE_ENV: 'production'
  HOST: '0.0.0.0'
  PORT: '3000'
  IP_CHECK_URL: 'https://link-ip.nextdns.io/f77259/6c421d78ad6b9e97'
  NTFY_URL: 'https://ntfy.elliott.haus'
  NTFY_TOPIC: 'ip-monitor'
  CHECK_INTERVAL_MINUTES: '60'
