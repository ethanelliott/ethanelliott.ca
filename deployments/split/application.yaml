apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: split
  namespace: elliott-haus
spec:
  project: elliott-haus
  source:
    repoURL: https://github.com/ethanelliott/ethanelliott.ca.git
    path: deployments/split
    targetRevision: main
    helm:
      releaseName: split
  destination:
    server: https://kubernetes.default.svc
    namespace: elliott-haus
  syncPolicy:
    automated: {}
