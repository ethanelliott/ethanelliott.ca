replicaCount: 1

image:
  repository: ghcr.io/bakito/sealed-secrets-web
  tag: v3.3.1
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8080

ingress:
  enabled: true
  hostname: 'sealed-secrets.elliott.haus'

resources:
  limits:
    cpu: 100m
    memory: 64Mi
  requests:
    cpu: 25m
    memory: 32Mi

# Connection to the sealed-secrets controller.
# The controller is deployed to kube-system as release 'sealed-secrets',
# so its service is accessible at sealed-secrets.kube-system.
sealedSecrets:
  controllerName: sealed-secrets
  controllerNamespace: elliott-haus
