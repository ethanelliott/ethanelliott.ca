apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: sealed-secrets-web
  namespace: elliott-haus
spec:
  project: elliott-haus
  source:
    repoURL: https://github.com/ethanelliott/ethanelliott.ca.git
    path: deployments/sealed-secrets-web
    targetRevision: main
    helm:
      releaseName: sealed-secrets-web
  destination:
    server: https://kubernetes.default.svc
    namespace: elliott-haus
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
