{{- if .Values.createSecret }}
# Helm-managed secret for development / quick bring-up.
# Created as a pre-sync hook so it exists before the db-init Job runs.
# For production, disable this (createSecret: false) and provide a SealedSecret
# named "{{ include "wheel.fullname" . }}-db-secrets" instead.
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "wheel.fullname" . }}-db-secrets
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "wheel.labels" . | nindent 4 }}
  annotations:
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-weight: "-10"
    helm.sh/hook-delete-policy: before-hook-creation
type: Opaque
data:
  db-password: {{ .Values.secrets.dbPassword | b64enc | quote }}
  jwt-secret: {{ .Values.secrets.jwtSecret | b64enc | quote }}
{{- end }}
