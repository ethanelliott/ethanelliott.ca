server {
    listen 80;
    server_name localhost recipes.elliott.haus;
    
    # Redirect HTTP to HTTPS in production
    if ($host = "recipes.elliott.haus") {
        return 301 https://$host$request_uri;
    }
    
    root /usr/share/nginx/html;
    index index.html;

    # Service worker + PWA control files must never be long-cached, or
    # clients won't pick up new versions. Exact-match locations take priority
    # over the hashed-asset regex below.
    location = /ngsw-worker.js {
        add_header Cache-Control "no-cache";
    }
    location = /ngsw.json {
        add_header Cache-Control "no-cache";
    }
    location = /safety-worker.js {
        add_header Cache-Control "no-cache";
    }
    location = /worker-basic.min.js {
        add_header Cache-Control "no-cache";
    }
    location = /manifest.webmanifest {
        add_header Cache-Control "no-cache";
    }
    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    # Handle Angular routing - serve index.html for all routes
    location / {
        try_files $uri $uri/ /index.html;
    }
    
    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    
    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/xml+rss application/json;
    
    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg)$ {
        expires 1y;
        add_header Cache-Control "public, no-transform";
    }
}
