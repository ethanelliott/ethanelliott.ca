server {
    listen 80;
    server_name localhost trip.elliott.haus;

    # Redirect HTTP to HTTPS in production
    if ($host = "trip.elliott.haus") {
        return 301 https://$host$request_uri;
    }

    root /usr/share/nginx/html;
    index index.html;

    # Security headers. Declared once at server level and, crucially, cache
    # control below uses `expires` rather than add_header — an add_header in a
    # location block would silently drop every server-level header for those
    # responses.
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https://tile.openstreetmap.org https://a.tile.openstreetmap.org https://b.tile.openstreetmap.org https://c.tile.openstreetmap.org; font-src 'self'; connect-src 'self' https://trip-api.elliott.haus https://nominatim.openstreetmap.org https://tile.openstreetmap.org https://a.tile.openstreetmap.org https://b.tile.openstreetmap.org https://c.tile.openstreetmap.org; worker-src 'self'; manifest-src 'self'; frame-ancestors 'self'; base-uri 'self'; form-action 'self'" always;

    # Service worker + PWA control files must never be long-cached, or
    # clients won't pick up new versions. `expires epoch` emits
    # Cache-Control: no-cache without clobbering the headers above.
    location = /ngsw-worker.js {
        expires epoch;
    }
    location = /ngsw.json {
        expires epoch;
    }
    location = /safety-worker.js {
        expires epoch;
    }
    location = /worker-basic.min.js {
        expires epoch;
    }
    location = /manifest.webmanifest {
        expires epoch;
    }
    location = /theme-init.js {
        expires epoch;
    }
    location = /index.html {
        expires epoch;
    }

    # Handle Angular routing - serve index.html for all routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/xml+rss application/json font/woff2;

    # Cache hashed static assets aggressively
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 1y;
    }
}
