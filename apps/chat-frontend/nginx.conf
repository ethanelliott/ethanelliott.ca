server {
    listen 80;
    server_name localhost chat.elliott.haus;
    
    # Redirect HTTP to HTTPS in production
    if ($host = "chat.elliott.haus") {
        return 301 https://$host$request_uri;
    }
    
    root /usr/share/nginx/html;
    index index.html;
    
    # Handle Angular routing - serve index.html for all routes
    location / {
        try_files $uri $uri/ /index.html;
    }
    
    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    
    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/xml+rss application/json;
    
    # Service worker files must never be cached long-term — the browser
    # polls them to detect new app versions (exact matches beat the regex
    # cache rule below)
    location = /ngsw-worker.js {
        add_header Cache-Control "no-cache";
    }

    location = /ngsw.json {
        add_header Cache-Control "no-cache";
    }

    location = /manifest.webmanifest {
        default_type application/manifest+json;
        add_header Cache-Control "no-cache";
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg)$ {
        expires 1y;
        add_header Cache-Control "public, no-transform";
    }
}
